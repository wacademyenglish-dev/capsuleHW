<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WOLF LABS | Memory Log (Homework)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Fonts: Lora (Nostalgic Serif), Inter (Body) & Caveat (Handwriting) -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* === THE TIME CAPSULE (MIDNIGHT SEPIA) === */
        :root {
            --bg-sepia: #16110f;       
            --bg-panel: #231b18;       
            --bg-inset: #0c0908;       
            --accent-amber: #d97706;   
            --accent-teal: #0f766e;    
            --accent-red: #991b1b;     
            --text-main: #fde047;      
            --text-muted: #a8a29e;     
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .font-serif { font-family: 'Lora', serif; }
        .font-code { font-family: 'JetBrains Mono', monospace; }
        .font-handwriting { font-family: 'Caveat', cursive; font-size: 1.2rem; letter-spacing: 1px;}

        /* === MOBILE PHONE MOCKUP === */
        #mobile-frame {
            width: 100%;
            max-width: 430px; 
            height: 100dvh;
            background-color: var(--bg-sepia);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(217, 119, 6, 0.15);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(217, 119, 6, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(15, 118, 110, 0.05) 0%, transparent 50%);
        }

        @media (min-width: 431px) {
            #mobile-frame {
                height: 90vh;
                border-radius: 40px;
                border: 12px solid #0c0908;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.9), inset 0 0 0 2px #332520;
            }
        }

        /* Fake Notch */
        .phone-notch {
            display: none;
        }
        @media (min-width: 431px) {
            .phone-notch {
                display: block;
                position: absolute; top: 0; left: 50%; transform: translateX(-50%);
                width: 150px; height: 30px; background-color: #0c0908;
                border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; z-index: 50;
            }
        }

        /* Status Bar */
        .status-bar {
            height: 44px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 24px; font-size: 12px; font-weight: 600; z-index: 40; position: relative; color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
        }

        /* BUTTONS */
        .btn-amber {
            background: linear-gradient(135deg, #f59e0b, #d97706); color: #16110f; border-radius: 8px;
            font-family: 'Inter', sans-serif; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.1em; transition: all 0.3s ease; border: none; cursor: pointer;
            box-shadow: 0 5px 15px rgba(217, 119, 6, 0.2);
        }
        .btn-amber:active { transform: scale(0.96); }

        .btn-outline {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: var(--text-main); border-radius: 8px;
            font-family: 'Inter', sans-serif; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; transition: all 0.2s ease; cursor: pointer;
        }
        .btn-outline:active { background: rgba(255,255,255,0.1); border-color: var(--accent-amber); transform: scale(0.96); }

        /* QUIZ OPTIONS (MCQ) */
        .mcq-option {
            background: var(--bg-panel); border: 1px solid rgba(255,255,255,0.03);
            transition: all 0.2s ease; cursor: pointer; display: flex; align-items: center; padding: 1.2rem; border-radius: 12px;
            width: 100%; text-align: left; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .mcq-option:active:not(.locked-check) { transform: scale(0.98); border-color: var(--accent-amber); background: rgba(217, 119, 6, 0.05);}
        .mcq-option.correct { background: rgba(15, 118, 110, 0.1); border-color: var(--accent-teal); color: var(--accent-teal); box-shadow: 0 0 15px rgba(15, 118, 110, 0.2); }
        .mcq-option.wrong { background: rgba(153, 27, 27, 0.1); border-color: var(--accent-red); color: #fca5a5; box-shadow: 0 0 15px rgba(153, 27, 27, 0.2);}

        /* ANIMATIONS */
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(3px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-5px, 0, 0); } 40%, 60% { transform: translate3d(5px, 0, 0); } }

        /* PROGRESS BAR */
        .progress-container { width: 100%; height: 4px; background: rgba(255,255,255,0.05); overflow: hidden; border-radius: 2px; margin-bottom: 24px;}
        .progress-fill { height: 100%; background: var(--accent-amber); transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 10px var(--accent-amber);}

        #confetti-canvas { position: absolute; inset: 0; pointer-events: none; z-index: 9999; }
    </style>
</head>
<body>

    <!-- MOBILE CONTAINER -->
    <div id="mobile-frame">
        <canvas id="confetti-canvas"></canvas>
        <div class="phone-notch"></div>
        
        <!-- Status Bar -->
        <div class="status-bar">
            <span id="clock">09:41</span>
            <div class="flex items-center gap-2">
                <i class="fas fa-signal text-[10px]"></i>
                <i class="fas fa-wifi text-[10px]"></i>
                <i class="fas fa-battery-full text-xs"></i>
            </div>
        </div>

        <!-- START SCREEN -->
        <div id="screen-start" class="flex-grow flex flex-col p-8 relative z-10 animate-in fade-in overflow-y-auto">
            
            <div class="my-auto flex flex-col items-center w-full">
                <div class="w-24 h-24 rounded-2xl bg-[var(--bg-inset)] mb-8 flex items-center justify-center border border-white/5 shadow-[0_0_20px_rgba(0,0,0,0.8)_inset]">
                    <i class="fas fa-scroll text-5xl text-[var(--accent-amber)] drop-shadow-[0_0_10px_rgba(217,119,6,0.3)]"></i>
                </div>
                
                <div class="text-center space-y-3 w-full">
                    <p class="text-[var(--accent-amber)] font-bold text-[10px] tracking-[0.4em] uppercase font-code bg-[var(--accent-amber)]/10 px-4 py-1.5 rounded inline-block border border-[var(--accent-amber)]/20 shadow-sm">Homework Protocol</p>
                    <h1 class="text-5xl font-black text-white leading-none tracking-tight uppercase font-serif mt-4">Memory<br><span class="text-[var(--accent-amber)] italic">Log</span></h1>
                    <p class="text-sm text-[var(--text-muted)] mt-4 leading-relaxed px-2 font-medium">Complete this 15-node evaluation to prove your grammar and past habit skills.</p>
                </div>
                
                <div class="w-full bg-[var(--bg-panel)] border border-white/5 p-6 rounded-xl mt-8 text-left mb-6 shadow-[0_10px_20px_rgba(0,0,0,0.5)]">
                    <p class="text-[10px] text-[var(--accent-teal)] font-bold uppercase tracking-widest border-b border-white/10 pb-3 mb-4 font-code">> ARCHIVE DATA</p>
                    <ul class="text-sm text-gray-300 font-inter space-y-3 font-medium">
                        <li class="flex items-center"><div class="w-6 h-6 rounded bg-white/5 border border-white/10 flex items-center justify-center mr-3"><i class="fas fa-check text-[var(--accent-teal)] text-[10px]"></i></div> Total Nodes: 15</li>
                        <li class="flex items-center"><div class="w-6 h-6 rounded bg-white/5 border border-white/10 flex items-center justify-center mr-3"><i class="fas fa-check text-[var(--accent-teal)] text-[10px]"></i></div> Focus: Used To</li>
                        <li class="flex items-center"><div class="w-6 h-6 rounded bg-white/5 border border-white/10 flex items-center justify-center mr-3"><i class="fas fa-check text-[var(--accent-teal)] text-[10px]"></i></div> Difficulty: A2 Access</li>
                    </ul>
                </div>
            </div>

            <!-- Button pushed to bottom but accessible via scroll -->
            <button onclick="startHomework()" class="btn-amber w-full py-4 text-base mt-8 mb-4 flex-shrink-0">
                Open Capsule
            </button>
        </div>

        <!-- QUIZ SCREEN -->
        <div id="screen-quiz" class="hidden flex-grow flex-col relative z-10 h-full overflow-hidden">
            <!-- Header -->
            <div class="pt-6 pb-2 px-6 flex justify-between items-center z-20 flex-shrink-0">
                <div class="flex flex-col">
                    <span class="text-[9px] font-bold text-[var(--text-muted)] uppercase tracking-widest font-code">Memory Progress</span>
                    <span class="text-sm font-black text-[var(--accent-amber)] font-code" id="progress-text">01 / 15</span>
                </div>
                <div class="flex items-center gap-2 bg-[var(--bg-inset)] px-3 py-1.5 rounded-lg border border-white/5 shadow-sm">
                    <i class="fas fa-star text-[var(--accent-teal)] text-[10px]"></i>
                    <span class="text-xs font-black text-white font-inter" id="score-text">000</span>
                </div>
            </div>
            
            <div class="px-6 w-full flex-shrink-0"><div class="progress-container"><div id="progress-bar" class="progress-fill" style="width: 0%;"></div></div></div>

            <!-- Question Area -->
            <div class="flex-grow overflow-y-auto px-6 pb-32 flex flex-col" id="question-container">
                <!-- Injected via JS -->
            </div>

            <!-- Next Button Container -->
            <div class="p-6 bg-gradient-to-t from-[var(--bg-sepia)] via-[var(--bg-sepia)] to-transparent mt-auto hidden absolute bottom-0 left-0 w-full z-30" id="next-btn-container">
                <button onclick="nextQuestion()" class="btn-amber w-full py-4 text-base shadow-[0_0_20px_rgba(217,119,6,0.3)] flex justify-center items-center gap-2">
                    Next Node <i class="fas fa-arrow-right text-sm"></i>
                </button>
            </div>
        </div>

        <!-- RESULT SCREEN -->
        <div id="screen-result" class="hidden flex-grow flex-col p-8 relative z-10 animate-in fade-in overflow-y-auto">
            <div class="my-auto flex flex-col items-center text-center w-full">
                <div id="result-icon" class="w-32 h-32 rounded-2xl bg-[var(--bg-inset)] mb-8 flex items-center justify-center border border-white/5 shadow-inner">
                    <i class="fas fa-check-circle text-6xl text-[var(--accent-teal)] drop-shadow-[0_0_15px_rgba(15,118,110,0.5)]"></i>
                </div>
                
                <h2 class="text-4xl font-black text-white tracking-tight uppercase font-serif mb-3" id="result-title">Capsule Sealed</h2>
                <p class="text-[10px] text-[var(--bg-sepia)] font-bold uppercase tracking-widest border border-[var(--accent-teal)] px-4 py-1.5 bg-[var(--accent-teal)] rounded mb-10 font-code" id="result-rank">Rank: Time Traveler</p>
                
                <div class="w-full bg-[var(--bg-panel)] border border-white/5 rounded-2xl py-8 mb-12 shadow-[0_10px_30px_rgba(0,0,0,0.5)]">
                    <p class="text-xs text-[var(--text-muted)] uppercase tracking-widest font-bold mb-2 font-code">Final Score</p>
                    <p class="text-6xl font-black text-white font-serif" id="final-score">15/15</p>
                </div>
            </div>
            
            <button onclick="location.reload()" class="btn-outline w-full py-4 text-sm mt-8 mb-4 flex-shrink-0 border-2">
                Disconnect
            </button>
        </div>

    </div>

    <!-- HOMEWORK ENGINE (JS) -->
    <script>
        // --- SECURITY & UTILS ---
        const esc = (s) => s ? String(s).replace(/\\/g, '\\\\').replace(/'/g, '&#39;').replace(/"/g, '&quot;').replace(/\n/g, '\\n').replace(/\r/g, '') : "";

        // -- Mobile Clock Logic --
        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            let m = now.getMinutes();
            h = h < 10 ? '0'+h : h;
            m = m < 10 ? '0'+m : m;
            document.getElementById('clock').innerText = `${h}:${m}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- HOMEWORK DATA (15 USED TO QUESTIONS) ---
        const homeworkData = [
            {
                q: "I ___ ride my bike every day when I was 10.",
                options: ["use to", "used to", "using to"],
                correct: 1,
                hint: "For affirmative past habits, we use the regular past form."
            },
            {
                q: "He didn't ___ like vegetables.",
                options: ["use to", "used to", "uses to"],
                correct: 0,
                hint: "After 'didn't', we drop the 'D'!"
            },
            {
                q: "___ you use to play video games?",
                options: ["Do", "Are", "Did"],
                correct: 2,
                hint: "Use the past auxiliary verb to start the question."
            },
            {
                q: "When I was a child, I used to ___ hide and seek.",
                options: ["played", "play", "playing"],
                correct: 1,
                hint: "After 'used to', the main verb is in the base form (infinitive)."
            },
            {
                q: "Which sentence is CORRECT?",
                options: ["I didn't used to read.", "I didn't use to read.", "I not used to read."],
                correct: 1,
                hint: "Negative: didn't + base form."
            },
            {
                q: "Now I drive a car, but I ___ walk to school.",
                options: ["used to", "use to", "am used to"],
                correct: 0,
                hint: "Contrasting the present with an affirmative past habit."
            },
            {
                q: "Did she ___ have long hair?",
                options: ["used to", "uses to", "use to"],
                correct: 2,
                hint: "After 'Did', we drop the 'D'!"
            },
            {
                q: "What is a 'habit'?",
                options: ["Something you do regularly", "A type of food", "A city"],
                correct: 0,
                hint: "Like brushing your teeth or playing a game every week."
            },
            {
                q: "He used to ___ cartoons on Saturday mornings.",
                options: ["watch", "watched", "watching"],
                correct: 0,
                hint: "The main verb after 'used to' is relaxed."
            },
            {
                q: "I didn't use to ___ coffee, but now I love it.",
                options: ["drinking", "drank", "drink"],
                correct: 2,
                hint: "Base verb after 'use to'."
            },
            {
                q: "Which word means 'Brincar às escondidas'?",
                options: ["Play tag", "Hide and seek", "Board games"],
                correct: 1,
                hint: "You hide, and someone finds you."
            },
            {
                q: "They ___ play outside all the time.",
                options: ["use to", "used to", "were used to"],
                correct: 1,
                hint: "Affirmative sentence needs the 'D'."
            },
            {
                q: "Did you use to ___ with action figures?",
                options: ["play", "played", "playing"],
                correct: 0,
                hint: "Base verb in the question."
            },
            {
                q: "Which sentence is WRONG?",
                options: ["I used to be shy.", "Did he use to sing?", "She didn't used to cry."],
                correct: 2,
                hint: "Look closely at the negative sentence..."
            },
            {
                q: "I ___ to live in London.",
                options: ["use", "used", "using"],
                correct: 1,
                hint: "Past state = Used."
            }
        ];

        // --- APP STATE ---
        let currentQ = 0;
        let score = 0;
        let isLocked = false;

        // --- NAVIGATION ---
        function showScreen(id) {
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-result').classList.add('hidden');
            
            const target = document.getElementById(id);
            target.classList.remove('hidden');
            target.classList.add('flex');
            target.classList.remove('fade-in');
            void target.offsetWidth; // trigger reflow
            target.classList.add('fade-in');
        }

        function startHomework() {
            // Randomize questions
            shuffleArray(homeworkData);
            homeworkData.forEach(q => {
                const correctText = q.options[q.correct];
                shuffleArray(q.options);
                q.correct = q.options.indexOf(correctText);
            });

            currentQ = 0;
            score = 0;
            updateTopBar();
            renderQuestion();
            showScreen('screen-quiz');
        }

        // --- QUIZ LOGIC ---
        function updateTopBar() {
            document.getElementById('progress-text').innerText = `${String(currentQ + 1).padStart(2, '0')} / ${homeworkData.length}`;
            document.getElementById('progress-bar').style.width = `${((currentQ) / homeworkData.length) * 100}%`;
            document.getElementById('score-text').innerText = String(score * 10).padStart(3, '0');
        }

        function renderQuestion() {
            isLocked = false;
            document.getElementById('next-btn-container').classList.add('hidden');
            
            const qData = homeworkData[currentQ];
            const container = document.getElementById('question-container');
            const letters = ['A', 'B', 'C'];

            let html = `
                <div class="mb-8 mt-4 animate-in fade-in">
                    <h2 class="text-3xl font-black text-white leading-snug font-serif tracking-wide">${qData.q.replace(/\[(.*?)\]/g, '<span class="text-[var(--accent-amber)]">$1</span>')}</h2>
                </div>
                <div class="space-y-4 w-full animate-in fade-in" id="options-box" style="animation-delay: 0.1s; animation-fill-mode: both;">
            `;

            qData.options.forEach((opt, idx) => {
                html += `
                    <button class="mcq-option group" onclick="selectOption(${idx}, this)">
                        <div class="w-10 h-10 rounded border border-white/5 bg-[var(--bg-inset)] flex items-center justify-center text-sm font-bold text-gray-500 mr-5 font-code group-hover:text-[var(--accent-amber)] group-hover:border-[var(--accent-amber)] transition-colors">${letters[idx]}</div>
                        <span class="text-lg font-bold text-[var(--text-main)] font-inter tracking-wide">${opt}</span>
                    </button>
                `;
            });

            html += `
                </div>
                <div id="feedback-box" class="hidden mt-8 p-6 rounded-xl bg-[var(--bg-inset)] border-l-4 border-[var(--accent-teal)] shadow-lg animate-in fade-in mb-8">
                    <p class="text-[10px] font-bold text-[var(--accent-teal)] uppercase tracking-[0.3em] font-code mb-2">> MEMORY LOG</p>
                    <p class="text-xl text-gray-300 font-handwriting leading-relaxed font-bold">"${qData.hint}"</p>
                </div>
            `;

            container.innerHTML = html;
            container.scrollTop = 0;
        }

        function selectOption(selectedIdx, btnEl) {
            if (isLocked) return;
            isLocked = true;

            const qData = homeworkData[currentQ];
            const isCorrect = selectedIdx === qData.correct;
            const parent = document.getElementById('options-box');

            // Lock buttons
            Array.from(parent.children).forEach((child, i) => {
                child.classList.add('locked-check');
                if (i === qData.correct) {
                    child.classList.add('correct'); 
                } else if (i !== qData.correct && i === selectedIdx) {
                    child.classList.add('wrong'); 
                } else {
                    child.classList.add('opacity-40'); 
                }
            });

            if (isCorrect) {
                score++;
                shootConfetti();
            } else {
                // Error shake effect
                document.getElementById('mobile-frame').classList.add('shake');
                setTimeout(() => document.getElementById('mobile-frame').classList.remove('shake'), 400);
                
                // Show hint if wrong
                const fbBox = document.getElementById('feedback-box');
                fbBox.classList.remove('hidden');
                fbBox.classList.replace('border-[var(--accent-teal)]', 'border-[var(--accent-red)]');
                fbBox.querySelector('p').classList.replace('text-[var(--accent-teal)]', 'text-[#fca5a5]');
            }

            updateTopBar();
            
            // Show Next button
            const nextBtn = document.getElementById('next-btn-container');
            nextBtn.classList.remove('hidden');
            nextBtn.style.animation = "fadeIn 0.3s ease forwards";
            
            // Scroll down
            setTimeout(() => {
                document.getElementById('question-container').scrollTo({
                    top: document.getElementById('question-container').scrollHeight,
                    behavior: 'smooth'
                });
            }, 100);
        }

        function nextQuestion() {
            currentQ++;
            if (currentQ < homeworkData.length) {
                updateTopBar();
                renderQuestion();
            } else {
                document.getElementById('progress-bar').style.width = `100%`;
                setTimeout(showResult, 300);
            }
        }

        function showResult() {
            showScreen('screen-result');
            
            document.getElementById('final-score').innerText = `${score}/15`;
            
            const rankEl = document.getElementById('result-rank');
            const iconEl = document.getElementById('result-icon');
            const titleEl = document.getElementById('result-title');

            const percentage = score / homeworkData.length;

            if (percentage === 1) {
                titleEl.innerText = "Flawless Memory";
                rankEl.innerText = "Rank: Time Traveler";
                rankEl.className = "text-[10px] text-[var(--bg-sepia)] font-bold uppercase tracking-[0.2em] border border-[var(--accent-teal)] px-4 py-1.5 bg-[var(--accent-teal)] rounded mb-10 shadow-[0_0_15px_rgba(15,118,110,0.4)] font-code";
                iconEl.innerHTML = '<i class="fas fa-crown text-6xl text-[var(--accent-teal)] drop-shadow-[0_0_10px_rgba(15,118,110,0.5)]"></i>';
                shootConfetti(); setTimeout(shootConfetti, 500);
            } else if (percentage >= 0.7) {
                titleEl.innerText = "Good Recall";
                rankEl.innerText = "Rank: Historian";
                rankEl.className = "text-[10px] text-[var(--bg-sepia)] font-bold uppercase tracking-[0.2em] border border-[var(--accent-amber)] px-4 py-1.5 bg-[var(--accent-amber)] rounded mb-10 shadow-[0_0_15px_rgba(217,119,6,0.4)] font-code";
                iconEl.innerHTML = '<i class="fas fa-scroll text-6xl text-[var(--accent-amber)] drop-shadow-[0_0_10px_rgba(217,119,6,0.5)]"></i>';
            } else {
                titleEl.innerText = "Memory Lost";
                rankEl.innerText = "Rank: Amnesiac";
                rankEl.className = "text-[10px] text-white font-bold uppercase tracking-[0.2em] border border-[var(--accent-red)] px-4 py-1.5 bg-red-900/30 rounded mb-10 shadow-sm font-code";
                iconEl.innerHTML = '<i class="fas fa-times-circle text-6xl text-[var(--accent-red)]"></i>';
            }
        }

        // --- UTILS ---
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // --- CONFETTI ENGINE (VINTAGE STYLE) ---
        function shootConfetti() {
            const cCanvas = document.getElementById('confetti-canvas'); 
            const cCtx = cCanvas.getContext('2d');
            const frame = document.getElementById('mobile-frame');
            cCanvas.width = frame.offsetWidth; 
            cCanvas.height = frame.offsetHeight;
            
            const pieces = []; 
            const colors = ['#d97706', '#0f766e', '#a8a29e', '#fde047'];
            
            for(let i=0; i<40; i++) {
                pieces.push({ 
                    x: cCanvas.width / 2, 
                    y: cCanvas.height / 2, 
                    vx: (Math.random() - 0.5) * 16, 
                    vy: (Math.random() - 1) * 16 - 4, 
                    size: Math.random() * 8 + 4, 
                    color: colors[Math.floor(Math.random() * colors.length)], 
                    rot: Math.random() * 360, 
                    rotSpeed: (Math.random() - 0.5) * 10 
                });
            }
            
            let animationId;
            function animateC() {
                cCtx.clearRect(0, 0, cCanvas.width, cCanvas.height); 
                let active = false;
                pieces.forEach(p => {
                    p.x += p.vx; 
                    p.y += p.vy; 
                    p.vy += 0.5; // gravity
                    p.rot += p.rotSpeed; 
                    if(p.y < cCanvas.height) active = true;
                    
                    cCtx.save(); 
                    cCtx.translate(p.x, p.y); 
                    cCtx.rotate(p.rot * Math.PI / 180); 
                    cCtx.fillStyle = p.color; 
                    // Rectangular confetti for vintage photos look
                    cCtx.fillRect(-p.size/2, -p.size/2, p.size, p.size*1.5); 
                    cCtx.restore(); 
                });
                
                if(active) {
                    animationId = requestAnimationFrame(animateC); 
                } else {
                    cCtx.clearRect(0, 0, cCanvas.width, cCanvas.height);
                }
            }
            animateC();
        }
    </script>
